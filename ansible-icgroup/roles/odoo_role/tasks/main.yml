- name: Installer les dependances Docker
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes

- name: Ajouter la cle GPG Docker
  ansible.builtin.shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Ajouter le repository Docker
  ansible.builtin.shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Installer Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Ajouter ubuntu au groupe docker
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: yes

- name: Creer le repertoire de donnees Odoo
  ansible.builtin.file:
    path: "{{ odoo_data_path }}"
    state: directory
    mode: "0755"

- name: Deployer le fichier docker-compose pour Odoo
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "/home/{{ ansible_user }}/docker-compose-odoo.yml"
    mode: "0644"

- name: Demarrer les containers Odoo
  community.docker.docker_compose_v2:
    project_src: "/home/{{ ansible_user }}"
    files:
      - docker-compose-odoo.yml
    state: present
